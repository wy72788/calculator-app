name: Build Calculator APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: calculator_app
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install buildozer
        run: |
          pip install buildozer
          cd calculator_app
          buildozer init
      
      - name: Build APK
        run: |
          cd calculator_app
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: calculator_app/bin/*.apk