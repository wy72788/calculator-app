name: Build Calculator APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: app
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Build with Buildozer
        uses: kc1ke/buildozer-action@v1
        with:
          path: app
          target: android
          mode: debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: app/bin/*.apk