name: Build Calculator APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: app
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd app
          pip install buildozer kivy
          pip install python-for-android
      
      - name: Build APK
        run: |
          cd app
          p4a apk --debug --_private_key_path=key.pem --variant=debug main.py kivy
        timeout-minutes: 30
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: app/*.apk